name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release (e.g. 1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  preflight:
    name: Preflight — verify preprod gate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get HEAD SHA
        id: get-sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check preprod tests passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api \
            repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[] | select(.name=="CD / Preprod Tests")] | first | .conclusion')

          echo "Preprod gate status: $STATUS"
          if [ "$STATUS" != "success" ]; then
            echo "::error::Preprod tests are not passing for this commit. Release blocked."
            exit 1
          fi

  tag-and-promote:
    name: Tag v${{ inputs.version }} and promote to prod
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      # Retag: no rebuild. The same image digest that passed preprod gets tagged for prod.
      - name: Retag image
        run: |
          crane tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ needs.preflight.outputs.sha }} \
            v${{ inputs.version }}

      - name: Promote to prod values
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository_owner }}/gitops-demo /tmp/gitops-demo
          cd /tmp/gitops-demo
          yq -i '.image.tag = "v${{ inputs.version }}"' values/prod/service-demo.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "release: promote v${{ inputs.version }} to prod"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create v${{ inputs.version }} --generate-notes --title "v${{ inputs.version }}"
