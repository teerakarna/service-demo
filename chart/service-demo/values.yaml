# Default values — overridden per environment via gitops-demo/values/{env}/service-demo.yaml

replicaCount: 1

image:
  repository: ghcr.io/teerakarna/service-demo
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  ENV_NAME: dev

# Namespace where shared services (other APIs, data) are discoverable.
# Ephemeral PR environments set this to 'dev' so they borrow stable,
# production-equivalent dependencies rather than spinning up their own copies.
# In-cluster: http://{service}.{servicesNamespace}.svc.cluster.local
servicesNamespace: dev

resources:
  limits:
    cpu: 250m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
