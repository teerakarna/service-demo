apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-demo.fullname" . }}
  labels:
    {{- include "service-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "service-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "service-demo.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENV_NAME
              value: {{ .Values.env.ENV_NAME | quote }}
            # Service discovery: other services are reachable at
            # http://{name}.$(SERVICES_NAMESPACE).svc.cluster.local
            # Ephemeral envs point to 'dev' (prod-parity); preprod and prod use their own namespace.
            - name: SERVICES_NAMESPACE
              value: {{ .Values.servicesNamespace | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
